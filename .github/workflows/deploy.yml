name: Build and deploy to MonsterASP.NET

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build release
        run: msbuild EnhanceAddiction.WebForms.sln /t:Build /p:Configuration=Release

      - name: Prepare publish folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path publish | Out-Null
          Copy-Item Api, Auth, Content, Scripts, bin -Destination publish -Recurse
          Copy-Item Default.aspx, Global.asax, Web.config -Destination publish

      - name: Deploy to MonsterASP.NET
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: '\publish\'
          target-delete: true
